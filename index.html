<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Search</title>
    <link href="index.css" rel="stylesheet">
</head>
<body>
    
    <nav id="nav">
        <h1>git-extends</h1>
        <div id="find">
            <div id="bar">
            <input type="text" id="search" class="search" placeholder="Search users">
            <div id="suggestions"></div>
            </div>
            <button id="button" type="button">search</button>
        </div>
        <div id="menue">
            
        </div>
    </nav>
    <div id="compare-form">
        <div id="note"></div>
        <div id="data">
            <div id="first"></div>
            <div id="second"></div>
        </div>
    </div>
    <div id="content">
        <div id="user"></div>
    </div>
    <div id="floating">
    <div id="dot">🔍</div>

    <div id="panel">
        <input type="text" placeholder="Search user" id="compare">
        <button id="compare-btn">Compare</button>
    </div>
</div>
    <script type="module" src="./src/app.js"></script>
</body>
</html>
