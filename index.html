<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub User Search</title>
    <link href="index.css" rel="stylesheet">
</head>
<body>
    <div id="compare-form">
        <div id="note"></div>
        <div id="data">
            <div id="first" class="compare-card"></div>
            <div id="second" class="compare-card"></div>
        </div>
    </div>
    <div id="web">
    <nav id="nav">
        <h1>git-extends</h1>
        <div id="find">
            <div id="bar">
            <input type="text" id="search" class="search" placeholder="Search users">
            <div id="suggestions"></div>
            </div>
            <button id="button" type="button">search</button>
        </div>
        <div id="menue">
            
        </div>
    </nav>
    
    <div id="content">
        <div id="user"></div>
        <div id="info"> 
        

<div class="headline">
    <div class="headline-in">
    <h2>Repositories</h2>
    <select id="sort">
    <option value="default">Default</option>
    <option value="stars">Stars</option>
    <option value="forks">Forks</option>
    <option value="updated">Recently Updated</option>
</select>
</div>
<div id="repos" class="sli">

</div>
</div>

<div class="headline"> 
    <div class="headline-in">
    <h2>Followers</h2>
    <input type="text" id="fsearch" placeholder="Search followers">
    </div>
<div id="followers" class="sli"></div>
</div>
</div>
    </div>
    <div id="floating">
    <div id="dot">🔍</div>

    <div id="panel">
        <input type="text" placeholder="Search user" id="compare">
        <button id="compare-btn">Compare</button>
    </div>
</div>
</div>
    <script type="module" src="./src/app.js"></script>
</body>
</html>
